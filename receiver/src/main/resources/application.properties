spring.application.name=receiver

# Runs on its own port so the sender (8080) can reach it at http://localhost:8081/upload
server.port=8081

# Where incoming files are written. Make sure this disk has >= the file size free.
receiver.output-dir=./received

# --- Critical settings for accepting a very large (e.g. 10 GB) streamed body ---

# We read the RAW request body as a stream, not multipart. Disable multipart so
# Spring never tries to buffer/parse the body.
spring.servlet.multipart.enabled=false

# Tomcat caps how many bytes it will "swallow" from an unread request body; -1 = no
# limit. Without this, large requests can be aborted by the container.
server.tomcat.max-swallow-size=-1

# Form POST size limit (-1 = unlimited). Raw octet-stream isn't a form, but we set
# this so nothing trips on size regardless of how a client labels the body.
server.tomcat.max-http-form-post-size=-1

# A 10 GB transfer takes minutes; keep the socket read timeout generous so the
# connection isn't killed mid-stream while data is still flowing.
server.tomcat.connection-timeout=600000

# Heap can stay small (e.g. -Xmx128m) because nothing is buffered in memory.

