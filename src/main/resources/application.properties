spring.application.name=sender

sender.receiver-url=http://localhost:8081/upload

sender.forwarder=restclient

# Multipart upload (@RequestParam MultipartFile). Enabled so Spring parses the 'file' part.
spring.servlet.multipart.enabled=true
# Remove the default 1MB/10MB caps so a 10GB file is allowed (-1 = unlimited).
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
# Spill the part to a temp file immediately instead of buffering in heap (0 = always to disk).
spring.servlet.multipart.file-size-threshold=0
# Optional: where the temp part files are staged (needs free space >= file size).
# spring.servlet.multipart.location=/tmp

# Don't let Tomcat cap the body size / swallow limits for large uploads.
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1
server.tomcat.connection-timeout=600000

